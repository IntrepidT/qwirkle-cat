services:
  app:
    build: .
    restart: unless-stopped
    environment:
      - PORT=8080
      - STATIC_DIR=/app/frontend/dist
    # Not exposed directly — nginx proxies to it
    expose:
      - "8080"
    networks:
      - internal

  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      # SSL certs — populated by certbot (see below)
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - app
    networks:
      - internal
      - external

  # Certbot for free Let's Encrypt TLS — run once to issue, then renews automatically
  certbot:
    image: certbot/certbot
    restart: unless-stopped
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    # Renews certs twice daily; nginx picks up the new cert on next reload
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done'"
    networks:
      - external

networks:
  internal:
    driver: bridge
  external:
    driver: bridge
