# Upstream — point at the Go app container.
# Add more server lines here if you scale to multiple app replicas.
upstream qwirklecat {
    server app:8080;
    # server app2:8080;  # uncomment to add a second replica
    keepalive 32;
}

# ── HTTP — redirect everything to HTTPS ──────────────────────────────────────
server {
    listen 80;
    server_name qwirklecat.com www.qwirklecat.com;

    # Let's Encrypt ACME challenge (needed for initial cert issue and renewals)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://qwirklecat.com$request_uri;
    }
}

